<svg width="700" height="750" viewBox="0 0 700 750" xmlns="http://www.w3.org/2000/svg" role="img">
<title>End to end user flow for the CPD Report Builder</title>
<desc>Six steps from triggering chapter generation through drafting, validation, editing with a loop back for re-validation, reviewer approval, and export.</desc>
<defs>
<marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="700" height="750" fill="#FFFFFF"/>

<rect x="60" y="40" width="480" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="300" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">1. Consultant triggers chapter generation</text>
<text x="300" y="84" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Scoped to the active engagement</text>
<line x1="300" y1="104" x2="300" y2="152" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow3)"/>

<rect x="60" y="154" width="480" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="300" y="178" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">2. AI drafts chapter with citations</text>
<text x="300" y="198" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Grounded in the engagement's own documents</text>
<line x1="300" y1="218" x2="300" y2="266" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow3)"/>

<rect x="60" y="268" width="480" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="300" y="292" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">3. Validation agent checks the draft</text>
<text x="300" y="312" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">Flags tone, structure, or consistency issues</text>
<line x1="300" y1="332" x2="300" y2="380" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow3)"/>

<rect x="60" y="382" width="480" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="300" y="406" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">4. Consultant or SME edits flagged sections</text>
<text x="300" y="426" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">Every change versioned and attributable</text>
<line x1="300" y1="446" x2="300" y2="494" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow3)"/>

<rect x="60" y="496" width="480" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="300" y="520" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">5. Reviewer approves the chapter</text>
<text x="300" y="540" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Logged sign-off, required before finalizing</text>
<line x1="300" y1="560" x2="300" y2="608" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow3)"/>

<rect x="60" y="610" width="480" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="300" y="634" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">6. Report exported once all chapters approved</text>
<text x="300" y="654" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Delivered to the client</text>

<path d="M540 414 L610 414 L610 300 L540 300" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow3)"/>
<text x="615" y="360" font-family="sans-serif" font-size="14" fill="#5F5E5A" text-anchor="middle">&#8635;</text>
<text x="300" y="712" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Dashed loop sends edited sections back through the validation agent before reviewer approval</text>
</svg>
