<svg width="700" height="870" viewBox="0 0 700 870" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Report generation pipeline for the CPD Report Builder</title>
<desc>Seven sequential steps from SharePoint ingestion through embedding, chapter generation, validation, and reviewer approval that produces a finalized report.</desc>
<defs>
<marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="700" height="870" fill="#FFFFFF"/>

<rect x="100" y="40" width="500" height="64" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="350" y="64" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">1. SharePoint ingestion</text>
<text x="350" y="84" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">Multi-format sync, up to 300MB per file</text>
<line x1="350" y1="104" x2="350" y2="152" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="100" y="154" width="500" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="350" y="178" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">2. Chunking and embedding</text>
<text x="350" y="198" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Indexed into a per-engagement vector store</text>
<line x1="350" y1="218" x2="350" y2="266" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="100" y="268" width="500" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="350" y="292" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">3. Retrieval and reranking</text>
<text x="350" y="312" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Scoped to the active engagement only</text>
<line x1="350" y1="332" x2="350" y2="380" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="100" y="382" width="500" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="350" y="406" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">4. Chapter generation</text>
<text x="350" y="426" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Claude drafts one section at a time with citations</text>
<line x1="350" y1="446" x2="350" y2="494" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="100" y="496" width="500" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="350" y="520" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">5. AI validation agent</text>
<text x="350" y="540" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">Flags tone, structure, and consistency issues</text>
<line x1="350" y1="560" x2="350" y2="608" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="100" y="610" width="500" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="350" y="634" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">6. Consultant and SME editing</text>
<text x="350" y="654" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Every change versioned and attributable</text>
<line x1="350" y1="674" x2="350" y2="722" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="100" y="724" width="500" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="350" y="748" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">7. Reviewer approval and export</text>
<text x="350" y="768" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">No report reaches final without sign-off</text>

<g font-family="sans-serif" font-size="12" fill="#5F5E5A">
<rect x="70" y="812" width="12" height="12" fill="#FAEEDA" stroke="#854F0B"/>
<text x="88" y="822">Ingestion</text>
<rect x="180" y="812" width="12" height="12" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="198" y="822">Retrieval and generation</text>
<rect x="370" y="812" width="12" height="12" fill="#EEEDFE" stroke="#534AB7"/>
<text x="388" y="822">Human editing</text>
<rect x="510" y="812" width="12" height="12" fill="#FAECE7" stroke="#993C1D"/>
<text x="528" y="822">Governance checkpoint</text>
</g>
</svg>
