<svg width="1100" height="260" viewBox="0 0 1100 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Before and after workflow comparison</title>
<desc>Side by side comparison of the manual report drafting workflow before the platform and the AI assisted workflow after, connected by an arrow labeled with the time savings.</desc>
<defs>
<marker id="arrow4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="1100" height="260" fill="#FFFFFF"/>

<rect x="60" y="40" width="420" height="180" rx="16" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="80" y="72" font-family="sans-serif" font-size="16" font-weight="500" fill="#444441">Before</text>
<text x="80" y="104" font-family="sans-serif" font-size="13" fill="#5F5E5A">Manual review of hundreds of project documents</text>
<text x="80" y="132" font-family="sans-serif" font-size="18" font-weight="500" fill="#444441">2 to 4 months per first draft</text>
<text x="80" y="160" font-family="sans-serif" font-size="13" fill="#5F5E5A">Bottlenecked on senior SME availability</text>

<line x1="490" y1="130" x2="610" y2="130" stroke="#5F5E5A" stroke-width="2" marker-end="url(#arrow4)"/>
<text x="550" y="108" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#712B13">90-95% faster</text>

<rect x="620" y="40" width="420" height="180" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="640" y="72" font-family="sans-serif" font-size="16" font-weight="500" fill="#085041">After</text>
<text x="640" y="104" font-family="sans-serif" font-size="13" fill="#0F6E56">Grounded first draft with citations, chapter by chapter</text>
<text x="640" y="132" font-family="sans-serif" font-size="18" font-weight="500" fill="#085041">3 to 5 days per first draft</text>
<text x="640" y="160" font-family="sans-serif" font-size="13" fill="#0F6E56">SME time shifts from drafting to validation</text>
</svg>
