<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Illustrative report editor mockup</title>
<desc>Conceptual wireframe of the chapter editor showing the chapter list sidebar, a drafted paragraph with a citation chip, a validation flag callout, and a request review button. This is an illustrative mockup, not a screenshot of the live client system.</desc>
<rect x="0" y="0" width="900" height="560" fill="#FFFFFF"/>
<rect x="0" y="0" width="240" height="560" fill="#F1EFE8"/>
<text x="20" y="34" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">Chapters</text>
<rect x="20" y="50" width="200" height="34" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="34" y="71" font-family="sans-serif" font-size="12" fill="#085041">3. Site risk assessment</text>
<rect x="20" y="92" width="200" height="34" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
<text x="34" y="113" font-family="sans-serif" font-size="12" fill="#5F5E5A">4. Regulatory compliance</text>
<rect x="20" y="134" width="200" height="34" rx="6" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
<text x="34" y="155" font-family="sans-serif" font-size="12" fill="#5F5E5A">5. Remediation plan</text>

<rect x="240" y="0" width="660" height="56" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
<text x="264" y="32" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">Chapter 3: Site risk assessment</text>
<rect x="740" y="14" width="130" height="30" rx="15" fill="#185FA5"/>
<text x="805" y="30" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" font-weight="500" fill="#FFFFFF">Request review</text>

<rect x="264" y="80" width="600" height="140" rx="12" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
<text x="284" y="108" font-family="sans-serif" font-size="13" fill="#444441">Soil sampling across the northern parcel identified</text>
<text x="284" y="128" font-family="sans-serif" font-size="13" fill="#444441">elevated contaminant levels consistent with prior</text>
<text x="284" y="148" font-family="sans-serif" font-size="13" fill="#444441">site use, requiring targeted remediation.</text>
<rect x="284" y="168" width="300" height="30" rx="15" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="296" y="188" font-family="sans-serif" font-size="11" fill="#085041">Source: Site_Survey_2024.pdf, p.7</text>

<rect x="264" y="240" width="600" height="70" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="284" y="266" font-family="sans-serif" font-size="12" font-weight="500" fill="#712B13">Validation agent flag: tone inconsistent with chapter 2</text>
<text x="284" y="286" font-family="sans-serif" font-size="12" fill="#993C1D">Suggested fix: align technical register with prior section</text>
</svg>
