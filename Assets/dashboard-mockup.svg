<svg width="900" height="560" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Illustrative engagement dashboard mockup</title>
<desc>Conceptual wireframe of the engagement progress dashboard with four metric cards and a per-chapter progress chart. This is an illustrative mockup, not a screenshot of the live client system.</desc>
<rect x="0" y="0" width="900" height="560" fill="#FFFFFF"/>
<rect x="0" y="0" width="900" height="60" fill="#F1EFE8"/>
<text x="30" y="30" dominant-baseline="central" font-family="sans-serif" font-size="16" font-weight="500" fill="#444441">Engagement dashboard</text>

<rect x="20" y="90" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
<text x="40" y="118" font-family="sans-serif" font-size="12" fill="#5F5E5A">Chapters drafted</text>
<text x="40" y="152" font-family="sans-serif" font-size="28" font-weight="500" fill="#0C447C">24</text>
<text x="40" y="174" font-family="sans-serif" font-size="11" fill="#5F5E5A">Across 4 active engagements</text>

<rect x="240" y="90" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
<text x="260" y="118" font-family="sans-serif" font-size="12" fill="#5F5E5A">Avg. turnaround</text>
<text x="260" y="152" font-family="sans-serif" font-size="28" font-weight="500" fill="#0C447C">4 days</text>
<text x="260" y="174" font-family="sans-serif" font-size="11" fill="#5F5E5A">Down from 2 to 4 months</text>

<rect x="460" y="90" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
<text x="480" y="118" font-family="sans-serif" font-size="12" fill="#5F5E5A">Validation flags resolved</text>
<text x="480" y="152" font-family="sans-serif" font-size="28" font-weight="500" fill="#0C447C">18</text>
<text x="480" y="174" font-family="sans-serif" font-size="11" fill="#5F5E5A">Before reviewer sign-off</text>

<rect x="680" y="90" width="200" height="100" rx="12" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
<text x="700" y="118" font-family="sans-serif" font-size="12" fill="#5F5E5A">Documents ingested</text>
<text x="700" y="152" font-family="sans-serif" font-size="28" font-weight="500" fill="#0C447C">540</text>
<text x="700" y="174" font-family="sans-serif" font-size="11" fill="#5F5E5A">This engagement</text>

<rect x="20" y="210" width="860" height="300" rx="12" fill="#FFFFFF" stroke="#D3D1C7" stroke-width="1"/>
<text x="40" y="240" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">Chapter progress, current engagement</text>
<line x1="40" y1="480" x2="860" y2="480" stroke="#B4B2A9" stroke-width="1"/>
<g fill="#0F6E56">
<rect x="60" y="380" width="40" height="100"/>
<rect x="138" y="350" width="40" height="130"/>
<rect x="216" y="400" width="40" height="80"/>
<rect x="294" y="320" width="40" height="160"/>
<rect x="372" y="360" width="40" height="120"/>
<rect x="450" y="300" width="40" height="180"/>
<rect x="528" y="340" width="40" height="140"/>
<rect x="606" y="280" width="40" height="200"/>
<rect x="684" y="330" width="40" height="150"/>
<rect x="762" y="270" width="40" height="210"/>
</g>
</svg>
