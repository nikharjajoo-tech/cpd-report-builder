<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AI-Powered CPD Report Builder hero banner</title>
<desc>Banner with the product name, tagline, and three headline impact metrics.</desc>
<rect x="0" y="0" width="1200" height="320" fill="#E1F5EE"/>
<text x="60" y="100" font-family="sans-serif" font-size="34" font-weight="500" fill="#04342C">AI-Powered CPD Report Builder</text>
<text x="60" y="140" font-family="sans-serif" font-size="16" fill="#085041">RAG-based report generation for environmental consulting engagements</text>

<rect x="90" y="220" width="320" height="60" rx="30" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="250" y="250" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#412402">90 to 95% faster first drafts</text>

<rect x="430" y="220" width="320" height="60" rx="30" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="590" y="250" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">3x ingestion scale, 100MB to 300MB</text>

<rect x="770" y="220" width="320" height="60" rx="30" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="930" y="250" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">500 to 600 documents per engagement</text>
</svg>
