<svg width="900" height="820" viewBox="0 0 900 820" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AI-Powered CPD Report Builder system architecture</title>
<desc>Four layered bands from top to bottom: client layer, application and workflow layer, AI layer, and data layer, connected by vertical arrows showing the request path.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="900" height="820" fill="#FFFFFF"/>

<rect x="200" y="20" width="500" height="110" rx="14" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
<text x="220" y="42" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">Client layer</text>
<rect x="300" y="58" width="300" height="52" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="450" y="84" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Web frontend (report editor)</text>

<line x1="450" y1="130" x2="450" y2="168" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="20" y="170" width="860" height="150" rx="14" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
<text x="40" y="194" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">Application and workflow layer</text>

<rect x="40" y="210" width="260" height="90" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="170" y="248" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">API gateway</text>
<text x="170" y="268" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">Routing and authentication</text>

<rect x="320" y="210" width="260" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="450" y="248" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Workflow orchestration</text>
<text x="450" y="268" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#534AB7">Chapter to report state machine</text>

<rect x="600" y="210" width="260" height="90" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="730" y="248" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">RBAC and permissions</text>
<text x="730" y="268" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">Per-engagement access scope</text>

<line x1="450" y1="320" x2="450" y2="358" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="20" y="360" width="860" height="240" rx="14" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
<text x="40" y="384" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">AI layer</text>

<rect x="40" y="400" width="260" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="170" y="434" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Embedding model</text>
<text x="170" y="454" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Text to vector conversion</text>

<rect x="320" y="400" width="260" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="450" y="434" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Vector database</text>
<text x="450" y="454" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Isolated per engagement</text>

<rect x="600" y="400" width="260" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="730" y="434" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Retriever and reranker</text>
<text x="730" y="454" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Top-k semantic search</text>

<rect x="40" y="500" width="260" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="170" y="534" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Claude chapter generation</text>
<text x="170" y="554" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Grounded, section by section</text>

<rect x="320" y="500" width="260" height="80" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="450" y="534" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">AI validation agent</text>
<text x="450" y="554" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">Tone, structure, consistency</text>

<rect x="600" y="500" width="260" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="730" y="534" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Citation generator</text>
<text x="730" y="554" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">Maps answer to source</text>

<line x1="450" y1="600" x2="450" y2="628" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="20" y="630" width="860" height="150" rx="14" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 4"/>
<text x="40" y="654" font-family="sans-serif" font-size="13" font-weight="500" fill="#444441">Data layer</text>

<rect x="40" y="660" width="260" height="90" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="170" y="698" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">SharePoint ingestion</text>
<text x="170" y="718" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">PDF, DOCX, XLSX, CSV, PPT, images</text>

<rect x="320" y="660" width="260" height="90" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="450" y="698" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">Version history store</text>
<text x="450" y="718" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">Every edit, attributable and reversible</text>

<rect x="600" y="660" width="260" height="90" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="730" y="698" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">AWS document storage</text>
<text x="730" y="718" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">Isolated per engagement</text>

<text x="40" y="800" font-family="sans-serif" font-size="12" fill="#5F5E5A">Reviewer approval and audit history run across every layer and are not shown as a separate box for clarity.</text>
</svg>
